<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShortLink Premium</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    linear-gradient(135deg,#020617,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

.container{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:35px;
    box-shadow:
    0 0 30px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:38px;
}

.desc{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:14px;
    margin-bottom:15px;
    background:#ffffff;
    font-size:15px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(
        135deg,
        #3b82f6,
        #2563eb
    );
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.result{
    margin-top:20px;
    background:rgba(0,0,0,0.3);
    padding:18px;
    border-radius:14px;
    display:none;
}

.result a{
    color:#38bdf8;
    word-break:break-all;
}

.redirect-box{
    text-align:center;
}

.loader{
    width:90px;
    height:90px;
    border:6px solid rgba(255,255,255,0.1);
    border-top:6px solid #3b82f6;
    border-radius:50%;
    margin:0 auto 25px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.progress{
    width:100%;
    height:10px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
    margin-top:25px;
}

.bar{
    height:100%;
    width:0%;
    background:linear-gradient(
        90deg,
        #38bdf8,
        #2563eb
    );
    animation:load 4s linear forwards;
}

@keyframes load{
    100%{
        width:100%;
    }
}

.small{
    margin-top:15px;
    color:#94a3b8;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container" id="mainContainer">

<h1>ShortLink</h1>

<p class="desc">
Penyingkat tautan modern 🚀
</p>

<input
type="url"
id="urlInput"
placeholder="Masukkan URL panjang..."
>

<button onclick="createShortLink()">
Shorten URL
</button>

<div class="result" id="resultBox">

<p>Short URL:</p>

<br>

<a href="#" target="_blank" id="shortUrl"></a>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
child
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

  apiKey: "AIzaSyAFEqtDXNJI-O1Yn8atXjuDCAGRoQB3Y2Q",
  authDomain: "teknodia.firebaseapp.com",
  projectId: "teknodia",
  storageBucket: "teknodia.firebasestorage.app",
  messagingSenderId: "4635381861",
  appId: "1:4635381861:web:d3a7b001d17fca9e37b68c",
  measurementId: "G-WVXTM4Y951"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

function randomCode(length = 6){

const chars =
"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let result = "";

for(let i=0;i<length;i++){

result += chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

return result;

}

window.createShortLink = async function(){

const url =
document.getElementById("urlInput").value.trim();

if(!url){

alert("Masukkan URL!");
return;

}

try{

new URL(url);

}catch{

alert("URL tidak valid!");
return;

}

const code = randomCode();

await set(
ref(db,"links/"+code),
{
url:url
}
);

const shortLink =
window.location.origin +
window.location.pathname +
"?s="+code;

document.getElementById(
"resultBox"
).style.display = "block";

const shortUrl =
document.getElementById("shortUrl");

shortUrl.href = shortLink;

shortUrl.innerText = shortLink;

};

async function redirectLink(){

const params =
new URLSearchParams(
window.location.search
);

const code = params.get("s");

if(!code) return;

document.getElementById(
"mainContainer"
).innerHTML = `

<div class="redirect-box">

<div class="loader"></div>

<h1>Preparing Link...</h1>

<p class="small">
Mohon tunggu sebentar 🚀
</p>

<div class="progress">
<div class="bar"></div>
</div>

</div>

`;

const dbRef = ref(db);

const snapshot = await get(
child(dbRef,"links/"+code)
);

if(snapshot.exists()){

const data = snapshot.val();

setTimeout(()=>{

window.location.href = data.url;

},4000);

}else{

document.getElementById(
"mainContainer"
).innerHTML = `

<h1>404</h1>

<p style="text-align:center;margin-top:15px;">
Link tidak ditemukan
</p>

`;

}

}

redirectLink();

</script>

</body>
</html>
