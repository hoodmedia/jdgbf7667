<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Firebase URL Shortener</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.result{
    margin-top:20px;
    display:none;
    background:#0f172a;

}

.result a{
    color:#38bdf8;

}

</style>
</head>

<body>

<div class="container">

<h1>ShortLink App</h1>

<input 
type="url" 
id="urlInput"
placeholder="Masukkan URL panjang..."
>

<button onclick="createShortLink()">
Shorten URL
</button>

<div class="result" id="resultBox">

<p>Short URL:</p>

<a href="#" target="_blank" id="shortUrl"></a>

</div>

</div>

<!-- Firebase -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    set,
    get,
    child
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


/* GANTI DENGAN CONFIG FIREBASE KAMU */

const firebaseConfig = {

  apiKey: "AIzaSyAFEqtDXNJI-O1Yn8atXjuDCAGRoQB3Y2Q",
  authDomain: "teknodia.firebaseapp.com",
  projectId: "teknodia",
  storageBucket: "teknodia.firebasestorage.app",
  messagingSenderId: "4635381861",
  appId: "1:4635381861:web:d3a7b001d17fca9e37b68c",
  measurementId: "G-WVXTM4Y951"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

function randomCode(length = 6){

    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    let result = "";

    for(let i = 0; i < length; i++){

        result += chars.charAt(
            Math.floor(Math.random() * chars.length)
        );

    }

    return result;
}

window.createShortLink = async function(){

    const url = document.getElementById("urlInput").value.trim();

    if(!url){

        alert("Masukkan URL!");

        return;
    }

    try{

        new URL(url);

    }catch{

        alert("URL tidak valid!");

        return;
    }

    const code = randomCode();

    await set(
        ref(db, "links/" + code),
        {
            url: url
        }
    );

    const shortLink =
        window.location.origin +
        window.location.pathname +
        "?s=" + code;

    document.getElementById("resultBox").style.display = "block";

    const shortUrl = document.getElementById("shortUrl");

    shortUrl.href = shortLink;

    shortUrl.innerText = shortLink;

};

async function redirectLink(){

    const params = new URLSearchParams(window.location.search);

    const code = params.get("s");

    if(!code) return;

    const dbRef = ref(db);

    const snapshot = await get(
        child(dbRef, "links/" + code)
    );

    if(snapshot.exists()){

        const data = snapshot.val();

        window.location.href = data.url;

    }else{

        document.body.innerHTML = `
            <div style="
                color:white;
                font-family:Arial;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                flex-direction:column;
                background:#0f172a;
            ">
                <h1>404</h1>
                <p>Link tidak ditemukan</p>
            </div>
        `;

    }

}

redirectLink();

</script>

</body>
</html>
